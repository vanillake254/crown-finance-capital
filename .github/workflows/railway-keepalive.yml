name: Keep Railway Backend Awake

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -fsS --max-time 20 "https://inspiring-spirit-production-ea08.up.railway.app/api/health/" > /dev/null
