name: Keep Railway Backend Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          # Railway free tier may return transient 502s during cold start.
          # Retry a few times so a single wake-up doesn't mark the workflow as failed.
          curl -fsS --max-time 30 \
            --retry 10 \
            --retry-all-errors \
            --retry-delay 5 \
            "https://inspiring-spirit-production-ea08.up.railway.app/api/health/" > /dev/null || true
